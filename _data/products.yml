live:
  - name: "Swing Compare"
    glyph: "⛳"
    description: "Mobile-first PWA for synced side-by-side golf swing comparison — up to 4 videos in a 2×2 grid, with two-finger angle-line drawing, impact-aligned playback, and a shareable swing library. Built for iPhone Safari first."
    tags: ["Next.js", "Supabase", "PWA", "iOS Safari"]
    url: "https://swingcompare.vercel.app"

  - name: "theForm"
    glyph: "⚽"
    description: "iOS and cross-platform Flutter app for sports leagues. Logs FIFA/EA FC games, tracks deep player stats (1v1 vs 2v2, head-to-head, club performance), and uses Gemini to auto-generate goal highlights from YouTube uploads."
    tags: ["iOS", "Flutter", "Firebase", "Supabase", "Gemini"]
    url: "https://youintheform.com"

  - name: "Car cost compare"
    glyph: "🚗"
    description: "Side-by-side 3-year total cost of ownership for any set of cars — lease, loan, or keep your current one. Editable driving profile, gas/electric scenarios, cumulative-cost chart, and share-links that bake in your custom inputs."
    tags: ["React", "Vite", "Tailwind", "GitHub Pages"]
    url: "https://alexfraseriv.github.io/car-cost-compare/"
    repo: "https://github.com/alexfraseriv/car-cost-compare"

wip:
  - name: "ClipCamel"
    glyph: "🎬"
    description: "Multi-agent AI pipeline that watches a YouTube/Twitch stream and returns a JSON of clickable timestamps for every goal, card, and key moment. GPU-accelerated on Modal; powers theForm's highlight generation under the hood."
    tags: ["Python", "Modal", "Gemini", "Supabase"]
