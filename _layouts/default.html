<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}{% unless page.title contains "Alex Fraser" %} — Alex Fraser{% endunless %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0c0f;
            --bg-elev: #14161b;
            --bg-card: #181a20;
            --border: #262932;
            --border-strong: #353945;
            --fg: #e8e9ec;
            --fg-muted: #9aa0ab;
            --fg-dim: #6b7280;
            --accent: #f5a524;
            --accent-soft: rgba(245, 165, 36, 0.12);
            --accent-fg: #0b0c0f;
            --radius: 14px;
            --radius-sm: 8px;
            --maxw: 1100px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.15s ease;
        }
        a:hover { color: #ffbe44; }

        ::selection { background: var(--accent); color: var(--accent-fg); }

        /* Subtle animated grain backdrop */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1200px 600px at 80% -10%, rgba(245, 165, 36, 0.08), transparent 60%),
                radial-gradient(900px 500px at -10% 30%, rgba(99, 102, 241, 0.05), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== NAV ===== */
        .nav {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: saturate(140%) blur(12px);
            -webkit-backdrop-filter: saturate(140%) blur(12px);
            background: rgba(11, 12, 15, 0.7);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: var(--maxw);
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
            font-weight: 600;
            font-size: 15px;
            color: var(--fg);
            letter-spacing: -0.01em;
        }
        .brand::before {
            content: '◆';
            color: var(--accent);
            margin-right: 8px;
        }
        .nav-links {
            display: flex;
            gap: 22px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            color: var(--fg-muted);
            font-size: 14px;
            font-weight: 500;
        }
        .nav-links a:hover { color: var(--fg); }
        .nav-links a[aria-current="page"] { color: var(--fg); }

        @media (max-width: 540px) {
            .nav-links { gap: 14px; }
            .nav-inner { padding: 12px 18px; }
        }

        /* ===== PAGE WRAP ===== */
        .page {
            position: relative;
            z-index: 1;
            max-width: var(--maxw);
            margin: 0 auto;
            padding: 56px 24px 96px;
        }
        @media (max-width: 640px) {
            .page { padding: 36px 18px 80px; }
        }

        /* ===== MARKDOWN CONTENT (legacy pages) ===== */
        .prose h1 {
            font-size: clamp(2rem, 5vw, 2.75rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 12px;
            line-height: 1.1;
        }
        .prose h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 36px 0 12px;
            letter-spacing: -0.01em;
        }
        .prose h2 strong { font-weight: 600; }
        .prose h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 24px 0 8px;
            color: var(--fg);
        }
        .prose p, .prose ul, .prose ol {
            color: var(--fg-muted);
            font-size: 1rem;
        }
        .prose ul, .prose ol { padding-left: 22px; }
        .prose li { margin-bottom: 6px; }
        .prose strong { color: var(--fg); }
        .prose hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 32px 0;
        }
        .prose code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            background: var(--bg-elev);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        /* ===== FOOTER ===== */
        .footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--border);
            margin-top: 60px;
            padding: 28px 24px;
            max-width: var(--maxw);
            margin-left: auto;
            margin-right: auto;
            color: var(--fg-dim);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .footer a {
            color: var(--fg-muted);
        }
        .footer a:hover { color: var(--fg); }
        .footer-links {
            display: flex;
            gap: 18px;
        }
    </style>
    {% if page.extra_head %}{{ page.extra_head }}{% endif %}
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="brand">alex fraser</a>
            <ul class="nav-links">
                {% for item in site.nav %}
                    <li><a href="{{ item.url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </nav>

    <main class="page {% unless page.no_prose %}prose{% endunless %}">
        {{ content }}
    </main>

    <footer class="footer">
        <div>&copy; {{ site.time | date: "%Y" }} Alex Fraser</div>
        <div class="footer-links">
            <a href="mailto:alex.fraser.iv@gmail.com">Email</a>
            <a href="https://github.com/alexfraseriv" target="_blank" rel="noopener">GitHub</a>
            <a href="https://www.linkedin.com/in/alex-fraser" target="_blank" rel="noopener">LinkedIn</a>
        </div>
    </footer>
</body>
</html>
